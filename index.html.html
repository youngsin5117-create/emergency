<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>25병동 응급 시뮬레이션</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F0F6FC;color:#1a2e44;min-height:100vh}
.game{max-width:440px;margin:0 auto;padding:12px;padding-bottom:40px}
.topbar{background:#1F4E79;border-radius:12px;padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.score-box{display:flex;gap:8px;align-items:center}
.score-pill{background:rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px}
.life-box{display:flex;gap:2px}
.life{font-size:15px}
.case-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.case-hdr{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.case-hdr-title{font-size:14px;font-weight:700;color:#1a2e44}

.patient-strip{background:#F8FAFD;padding:9px 14px;border-bottom:1px solid #F1F5F9}
.pt-row{display:flex;gap:14px;flex-wrap:wrap}
.pt-item{font-size:11px;color:#64748B}

.monitor-bg{background:#080808;border-radius:10px;margin:10px 12px 6px;padding:11px 13px}
.monitor-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}

.vital-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.vital-value{font-size:20px;font-weight:800;line-height:1;letter-spacing:-0.5px}
.vital-unit{font-size:10px;font-weight:400;margin-left:2px}
.vn{color:#4CAF50}.vw{color:#FF9800}.vd{color:#F44336}
.ecg-area{background:#080808;border-radius:7px;margin:0 12px 10px;padding:8px 10px}
.ecg-label{font-size:9px;color:#444;letter-spacing:.5px;margin-bottom:5px}
canvas{display:block;width:100%;height:52px}
.situation-box{padding:12px 14px;border-top:1px solid #F1F5F9}
.situation-box p{font-size:13px;line-height:1.65;color:#2C3A4A}
.nurse-says{background:#EFF6FF;border-left:3px solid #2E75B6;border-radius:0 6px 6px 0;padding:8px 11px;margin-top:8px;font-size:12px;color:#1e40af;font-style:italic;line-height:1.5}
.choices{padding:0 14px 14px}
.choices-title{font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.choice-btn{width:100%;text-align:left;background:#fff;border:1.5px solid #E2E8F0;border-radius:9px;padding:11px 12px;font-size:13px;color:#1a2e44;cursor:pointer;margin-bottom:7px;font-family:inherit;display:flex;align-items:flex-start;gap:9px;line-height:1.45;transition:border-color .15s,background .15s}
.choice-btn:hover{border-color:#94A3B8;background:#F8FAFD}

.choice-no{font-size:11px;font-weight:700;color:#94A3B8;min-width:18px;padding-top:1px;flex-shrink:0}
.choice-btn.correct{background:#F0FDF4;border-color:#4CAF50;color:#14532d}

.choice-btn.wrong{background:#FFF1F2;border-color:#F44336;color:#7f1d1d}
.choice-btn.wrong .choice-no{color:#F44336}
.choice-btn.missed{background:#FFFBEB;border-color:#F59E0B;color:#78350f}

.feedback-box{margin:4px 14px 14px;border-radius:10px;padding:13px 14px}
.feedback-box.correct{background:#F0FDF4;border:1.5px solid #4CAF50}
.feedback-box.wrong{background:#FFF1F2;border:1.5px solid #F44336}

.feedback-body{font-size:12.5px;line-height:1.65;color:#2C3A4A}

.next-btn{background:#1F75FE;color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:block;width:calc(100% - 28px);margin:0 14px 14px}
.next-btn:hover{background:#1558C0}
.next-btn:active{transform:scale(.98)}
.progress-bar{height:5px;background:#E2E8F0;border-radius:3px;margin:0 14px 10px;overflow:hidden}
.progress-fill{height:100%;background:#1F75FE;border-radius:3px;transition:width .5s ease}
.timer-row{display:flex;align-items:center;justify-content:space-between;padding:0 14px;margin-bottom:9px}
.timer-label{font-size:11px;color:#64748B;font-weight:600}
.timer-val{font-size:14px;font-weight:800;color:#1F75FE;font-variant-numeric:tabular-nums}
.timer-val.urgent{color:#F44336;animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.5}}
.intro-screen,.result-screen{text-align:center;padding:20px 14px}
.intro-icon{font-size:48px;margin-bottom:12px;color:#1F75FE}
.intro-screen h2{font-size:21px;font-weight:800;color:#1a2e44;margin-bottom:10px}
.intro-screen p{font-size:13px;color:#64748B;line-height:1.65;margin-bottom:18px}
.case-list{background:#F8FAFD;border-radius:10px;padding:12px 14px;margin-bottom:18px;text-align:left;border:1px solid #E2E8F0}
.case-list-item{font-size:12px;padding:6px 0;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;gap:8px;color:#374151}
.case-list-item:last-child{border-bottom:none}
.case-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.case-idx{font-weight:700;font-size:11px;color:#64748B;min-width:52px}
.start-btn{width:100%;background:#1F4E79;color:#fff;border:none;border-radius:11px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.2px}
.start-btn:hover{background:#163A5E}
.start-btn:active{transform:scale(.98)}
.result-score{font-size:52px;font-weight:900;color:#1F75FE;line-height:1;letter-spacing:-1px}
.result-label{font-size:13px;color:#64748B;margin:4px 0 14px}
.result-grade{font-size:26px;font-weight:800;margin-bottom:8px}
.result-msg{font-size:13px;color:#64748B;line-height:1.65;margin-bottom:18px}
.result-breakdown{background:#F8FAFD;border-radius:10px;padding:14px;margin-bottom:16px;text-align:left;border:1px solid #E2E8F0}
.breakdown-hd{font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid #F1F5F9}
.breakdown-row:last-child{border-bottom:none}
.breakdown-case{color:#374151;flex:1}
.breakdown-result{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap}
.ok{background:#F0FDF4;color:#14532d}.fail{background:#FFF1F2;color:#7f1d1d}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-box{background:#F8FAFD;border-radius:9px;padding:12px;text-align:center;border:1px solid #E2E8F0}
.stat-n{font-size:24px;font-weight:800;line-height:1}
.stat-l{font-size:11px;color:#64748B;margin-top:3px}
.restart-btn{width:100%;background:#1F4E79;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.restart-btn:hover{background:#163A5E}
.restart-btn:active{transform:scale(.98)}
.timeout-badge{background:#FFFBEB;border:1px solid #F59E0B;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;color:#92400E;margin-bottom:8px;display:inline-block}
</style>
</head>

</div>

let cur=0,score=0,lives=3,answered=false,results=[],timerInt=null,timeLeft=60;

function renderLives(){
  const el=document.getElementById('life-display');
  el.innerHTML=Array.from({length:3},(_,i)=>`<span class="life">${i<lives?'❤':'🖤'}</span>`).join('');
}

function drawECG(canvas,type){
  if(!canvas)return;
  const w=canvas.width=canvas.parentElement.offsetWidth-20;
  const h=canvas.height=52;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const mid=h/2;
  ctx.strokeStyle=type==='vf'?'#FF5252':type==='completeavb'?'#FF9800':'#00E676';
  ctx.lineWidth=1.6;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();
  if(type==='normal'){
    ctx.moveTo(0,mid);let x=0;
    const beat=sx=>{ctx.lineTo(sx,mid);ctx.lineTo(sx+8,mid);ctx.lineTo(sx+10,mid-4);ctx.lineTo(sx+12,mid);ctx.lineTo(sx+13,mid);ctx.lineTo(sx+14,mid-2);ctx.lineTo(sx+16,mid+28);ctx.lineTo(sx+17,mid-18);ctx.lineTo(sx+18,mid+6);ctx.lineTo(sx+19,mid);ctx.lineTo(sx+22,mid);ctx.lineTo(sx+24,mid-8);ctx.lineTo(sx+26,mid-8);ctx.lineTo(sx+28,mid);ctx.lineTo(sx+44,mid);};
    while(x<w){beat(x);x+=44;}
  } else if(type==='vf'){
    ctx.moveTo(0,mid);for(let x=0;x<w;x+=2)ctx.lineTo(x,(Math.sin(x*.3+Math.random()*.8)*(h*.42))+(Math.random()-.5)*h*.22+mid);
  } else if(type==='afib'){
    ctx.moveTo(0,mid);let x=0;const gaps=[28,22,34,19,26,30];let gi=0;
    while(x<w){const g=gaps[gi%gaps.length];for(let j=0;j<g;j++)ctx.lineTo(x+j,Math.sin(j*.9+gi)*h*.1+(Math.random()-.5)*h*.06+mid);const qx=x+g;if(qx+14<w){ctx.lineTo(qx,mid);ctx.lineTo(qx+1,mid-3);ctx.lineTo(qx+2,mid+24);ctx.lineTo(qx+3,mid-14);ctx.lineTo(qx+4,mid+4);ctx.lineTo(qx+5,mid);ctx.lineTo(qx+9,mid-6);ctx.lineTo(qx+12,mid-6);ctx.lineTo(qx+14,mid);}x+=g+14;gi++;}
  } else if(type==='tachy'){
    ctx.moveTo(0,mid);let x=0;
    const b=sx=>{ctx.lineTo(sx,mid);ctx.lineTo(sx+4,mid);ctx.lineTo(sx+5,mid-2);ctx.lineTo(sx+7,mid+22);ctx.lineTo(sx+8,mid-14);ctx.lineTo(sx+9,mid+4);ctx.lineTo(sx+10,mid);ctx.lineTo(sx+13,mid-6);ctx.lineTo(sx+15,mid-6);ctx.lineTo(sx+16,mid);ctx.lineTo(sx+26,mid);};
    while(x<w){b(x);x+=26;}
  } else if(type==='brady'){
    ctx.moveTo(0,mid);let x=0;
    const b=sx=>{ctx.lineTo(sx,mid);ctx.lineTo(sx+6,mid);ctx.lineTo(sx+8,mid-4);ctx.lineTo(sx+10,mid);ctx.lineTo(sx+11,mid);ctx.lineTo(sx+12,mid-2);ctx.lineTo(sx+14,mid+26);ctx.lineTo(sx+15,mid-18);ctx.lineTo(sx+16,mid+6);ctx.lineTo(sx+17,mid);ctx.lineTo(sx+20,mid);ctx.lineTo(sx+22,mid-8);ctx.lineTo(sx+25,mid-8);ctx.lineTo(sx+27,mid);ctx.lineTo(sx+72,mid);};
    while(x<w){b(x);x+=72;}
  } else if(type==='completeavb'){
    ctx.moveTo(0,mid);let x=0,px=0,qnext=28;
    while(x<w){if(Math.abs(x-px)<2&&px<w){ctx.lineTo(px,mid);ctx.lineTo(px+3,mid-6);ctx.lineTo(px+5,mid-7);ctx.lineTo(px+7,mid-6);ctx.lineTo(px+8,mid);ctx.lineTo(px+14,mid);px+=14;x=px;}else if(x>=qnext&&qnext<w-20){ctx.lineTo(qnext,mid);ctx.lineTo(qnext+2,mid+3);ctx.lineTo(qnext+4,mid+20);ctx.lineTo(qnext+5,mid-14);ctx.lineTo(qnext+7,mid+4);ctx.lineTo(qnext+8,mid);ctx.lineTo(qnext+11,mid-6);ctx.lineTo(qnext+16,mid-6);ctx.lineTo(qnext+18,mid);ctx.lineTo(qnext+62,mid);x=qnext+62;qnext+=62;}else{ctx.lineTo(x,mid);x+=14;}}
  }
  ctx.stroke();
}

function startTimer(){
  clearInterval(timerInt);timeLeft=60;
  timerInt=setInterval(()=>{
    timeLeft--;
    const el=document.getElementById('timer-val');
    if(el){el.textContent=timeLeft+'초';el.className='timer-val'+(timeLeft<=10?' urgent':'');}
    if(timeLeft<=0){clearInterval(timerInt);if(!answered)autoFail();}
  },1000);
}

function autoFail(){
  answered=true;lives=Math.max(0,lives-1);renderLives();
  results.push({i:cur,ok:false,timeout:true});
  const c=CASES[cur];
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{b.disabled=true;if(c.choices[i].ok)b.classList.add('missed');});
  showFeedback(false,c,true);
  if(lives<=0){clearInterval(timerInt);setTimeout(showResult,2200);}
}

function showIntro(){
  document.getElementById('score-display').textContent='0점';
  document.getElementById('main').innerHTML=`
  <div class="intro-screen">
    <div class="intro-icon"><i class="ti ti-stethoscope" aria-hidden="true"></i></div>
    <h2>25병동 응급 시뮬레이션</h2>
    <p>실제 임상 상황을 시뮬레이션합니다.<br>올바른 대응을 선택하세요!<br>오답 시 하트 감소 / 60초 타임오버 시 자동 실패</p>
    <div class="case-list">
      ${CASES.map((c,i)=>`<div class="case-list-item">
        <div class="case-dot" style="background:${c.tagColor}"></div>
        <span class="case-idx">Case ${i+1}</span>
        <span>${c.title}</span>
      </div>`).join('')}
    </div>
    <button class="start-btn" onclick="startGame()">
      <i class="ti ti-player-play" aria-hidden="true" style="font-size:17px;vertical-align:-3px;margin-right:7px"></i>시뮬레이션 시작
    </button>
  </div>`;
}

function startGame(){cur=0;score=0;lives=3;results=[];renderLives();showCase();}

function showCase(){
  if(cur>=CASES.length){clearInterval(timerInt);showResult();return;}
  answered=false;
  const c=CASES[cur];
  const pct=Math.round(cur/CASES.length*100);
  document.getElementById('score-display').textContent=score+'점';
  document.getElementById('main').innerHTML=`
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="timer-row">
    <span class="timer-label">Case ${cur+1} / ${CASES.length}</span>
    <span class="timer-val" id="timer-val">60초</span>
  </div>
  <div class="case-card">
    <div class="case-hdr">
      <span class="case-hdr-title">${c.title}</span>
      <span class="case-tag" style="color:${c.tagColor};background:${c.tagBg}">${c.tag}</span>
    </div>
    <div class="patient-strip">
      <div class="pt-row">
        <div class="pt-item"><strong>${c.patient.name}</strong> ${c.patient.age}</div>
        <div class="pt-item"><strong>${c.patient.room}</strong></div>
        <div class="pt-item">${c.patient.dx}</div>
      </div>
    </div>
    <div class="monitor-bg">
      <div class="monitor-row">
        ${c.vitals.map(v=>`<div class="vital-box">
          <div class="vital-label">${v.l}</div>
          <div class="vital-value ${v.c}">${v.v}<span class="vital-unit">${v.u}</span></div>
        </div>`).join('')}
      </div>
    </div>
    <div class="ecg-area">
      <div class="ecg-label">ECG MONITOR</div>
      <canvas id="ecg-cv"></canvas>
    </div>
    <div class="situation-box">
      <p>${c.situation}</p>
      ${c.nurse?`<div class="nurse-says">"${c.nurse}"</div>`:''}
    </div>
    <div class="choices">
      <div class="choices-title">최선의 대응은?</div>
      ${c.choices.map((ch,i)=>`<button class="choice-btn" onclick="pick(${i})">
        <span class="choice-no">${i+1}</span>
        <span>${ch.t}</span>
      </button>`).join('')}
    </div>
  </div>`;
  setTimeout(()=>{const cv=document.getElementById('ecg-cv');if(cv)drawECG(cv,c.ecg);},80);
  startTimer();
}

function pick(idx){
  if(answered)return;
  answered=true;clearInterval(timerInt);
  const c=CASES[cur];
  const ok=c.choices[idx].ok;
  if(ok)score+=Math.max(10,Math.round(timeLeft/60*100));
  else lives=Math.max(0,lives-1);
  renderLives();
  results.push({i:cur,ok,idx});
  document.getElementById('score-display').textContent=score+'점';
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(c.choices[i].ok)b.classList.add('correct');
    else if(i===idx&&!c.choices[i].ok)b.classList.add('wrong');
  });
  showFeedback(ok,c,false);
  if(lives<=0){clearInterval(timerInt);setTimeout(showResult,2500);}
}

function showFeedback(ok,c,timeout){
  const wrap=document.querySelector('.choices');
  if(!wrap)return;
  const fb=document.createElement('div');
  fb.className=`feedback-box ${ok?'correct':'wrong'}`;
  fb.innerHTML=`
    ${timeout?'<div class="timeout-badge">⏰ 시간 초과!</div><br>':''}
    <div class="feedback-title">
      <i class="ti ${ok?'ti-circle-check':'ti-circle-x'}" aria-hidden="true" style="font-size:18px;color:${ok?'#4CAF50':'#F44336'}"></i>
      ${ok?'정답입니다! 훌륭해요':'오답입니다!'}
    </div>
    <div class="feedback-body">${ok?c.okFb:c.failFb}</div>
    <div class="feedback-key">
      <i class="ti ti-bulb" aria-hidden="true" style="font-size:13px;vertical-align:-2px;margin-right:4px;color:#F59E0B"></i>
      핵심: ${c.key}
    </div>`;
  wrap.appendChild(fb);
  const nb=document.createElement('button');
  nb.className='next-btn';
  nb.innerHTML=cur<CASES.length-1
    ?'<i class="ti ti-arrow-right" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>다음 케이스'
    :'<i class="ti ti-flag-3" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>최종 결과 확인';
  nb.onclick=()=>{cur++;showCase();};
  wrap.appendChild(nb);
  setTimeout(()=>fb.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function showResult(){
  clearInterval(timerInt);
  const total=CASES.length;
  const correct=results.filter(r=>r.ok).length;
  const pct=Math.round(correct/total*100);
  let grade,gc,msg;
  if(pct>=90){grade='A+ 최우수 간호사';gc='#14532d';msg='완벽한 응급 대응 능력입니다! 프리셉터도 인정할 실력이에요.';}
  else if(pct>=75){grade='B+ 우수';gc='#1e40af';msg='대부분의 상황에서 올바른 판단을 했습니다. 틀린 케이스를 복습하면 완벽해져요!';}
  else if(pct>=50){grade='C 양호';gc='#92400E';msg='기본 대응은 알고 있지만 우선순위가 아직 헷갈리는군요. 교육 자료를 다시 복습해보세요!';}
  else{grade='D 재도전 필요';gc='#7f1d1d';msg='응급 대응 순서를 더 연습해야 합니다. SBAR 케이스와 교육 자료를 충분히 복습 후 다시 도전하세요!';}

  document.getElementById('main').innerHTML=`
  <div class="result-screen">
    <div style="font-size:44px;margin-bottom:10px;color:#1F75FE"><i class="ti ti-award" aria-hidden="true"></i></div>
    <div class="result-score">${score}</div>
    <div class="result-label">최종 점수</div>
    <div class="result-grade" style="color:${gc}">${grade}</div>
    <div class="result-msg">${msg}</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-n" style="color:#14532d">${correct}/${total}</div><div class="stat-l">정답 수</div></div>
      <div class="stat-box"><div class="stat-n" style="color:#1F75FE">${lives}</div><div class="stat-l">남은 하트</div></div>
    </div>
    <div class="result-breakdown">
      <div class="breakdown-hd">케이스별 결과</div>
      ${CASES.map((c,i)=>{const r=results.find(r=>r.i===i);const ok=r&&r.ok;return`<div class="breakdown-row"><span class="breakdown-case">${c.title}</span><span class="breakdown-result ${ok?'ok':'fail'}">${ok?'✓ 정답':'✗ 오답'}</span></div>`;}).join('')}
    </div>
    <button class="restart-btn" onclick="startGame()">
      <i class="ti ti-refresh" aria-hidden="true" style="font-size:16px;vertical-align:-2px;margin-right:7px"></i>다시 도전하기
    </button>
  </div>`;
}

renderLives();
showIntro();
</script>
</body>

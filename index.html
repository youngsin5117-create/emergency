<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>25병동 간호 시뮬레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F0F6FC;color:#1a2e44;min-height:100vh}
.game{max-width:440px;margin:0 auto;padding:12px;padding-bottom:40px}
.topbar{background:#1F4E79;border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.score-box{display:flex;gap:8px;align-items:center}
.score-pill{background:rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.life-box{display:flex;gap:2px}
.life{font-size:14px}

/* 모드 선택 */
.mode-screen{padding:4px 0}
.mode-title{font-size:20px;font-weight:800;color:#1a2e44;margin-bottom:6px;text-align:center}
.mode-sub{font-size:12px;color:#64748B;text-align:center;margin-bottom:16px;line-height:1.6}
.mode-card{background:#fff;border-radius:12px;border:1.5px solid #E2E8F0;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.mode-card:hover{border-color:#1F75FE;background:#F8FBFF}
.mode-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mode-info{flex:1}
.mode-name{font-size:14px;font-weight:700;color:#1a2e44;margin-bottom:3px}
.mode-desc{font-size:11px;color:#64748B;line-height:1.4}
.mode-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:4px;display:inline-block}
.bank-stat{background:#F8FAFD;border-radius:10px;padding:10px 14px;margin-bottom:14px;border:1px solid #E2E8F0}
.stat-row-intro{display:flex;justify-content:space-between;font-size:11px;color:#64748B;padding:3px 0;border-bottom:1px solid #F1F5F9}
.stat-row-intro:last-child{border-bottom:none}
.stat-row-intro strong{color:#1a2e44}

/* 문제 공통 */
.case-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;margin-bottom:10px;overflow:hidden}
.case-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.case-hdr-title{font-size:13px;font-weight:700;color:#1a2e44;flex:1}
.case-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.patient-strip{background:#F8FAFD;padding:8px 14px;border-bottom:1px solid #F1F5F9}
.pt-row{display:flex;gap:12px;flex-wrap:wrap}
.pt-item{font-size:11px;color:#64748B}
.pt-item strong{color:#1a2e44;font-weight:700}
.monitor-bg{background:#080808;border-radius:10px;margin:10px 12px 6px;padding:10px 12px}
.monitor-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:4px}
.vital-box{background:#111;border-radius:6px;padding:6px 8px}
.vital-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.vital-value{font-size:17px;font-weight:800;line-height:1;letter-spacing:-0.5px}
.vital-unit{font-size:9px;font-weight:400;margin-left:2px}
.vn{color:#4CAF50}.vw{color:#FF9800}.vd{color:#F44336}
.ecg-area{background:#080808;border-radius:7px;margin:0 12px 10px;padding:8px 10px}
.ecg-label{font-size:9px;color:#444;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
canvas{display:block;width:100%;height:52px}
.situation-box{padding:11px 14px;border-top:1px solid #F1F5F9}
.situation-box p{font-size:12.5px;line-height:1.65;color:#2C3A4A}
.nurse-says{background:#EFF6FF;border-left:3px solid #2E75B6;border-radius:0 6px 6px 0;padding:7px 10px;margin-top:7px;font-size:11.5px;color:#1e40af;font-style:italic;line-height:1.5}

/* 선택지 */
.choices{padding:0 14px 14px}
.choices-title{font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.choice-btn{width:100%;text-align:left;background:#fff;border:1.5px solid #E2E8F0;border-radius:9px;padding:10px 12px;font-size:12.5px;color:#1a2e44;cursor:pointer;margin-bottom:6px;font-family:inherit;display:flex;align-items:flex-start;gap:8px;line-height:1.4;transition:all .15s}
.choice-btn:hover{border-color:#94A3B8;background:#F8FAFD}
.choice-no{font-size:11px;font-weight:700;color:#94A3B8;min-width:18px;padding-top:1px;flex-shrink:0}
.choice-btn.correct{background:#F0FDF4;border-color:#4CAF50;color:#14532d}
.choice-btn.correct .choice-no{color:#4CAF50}
.choice-btn.wrong{background:#FFF1F2;border-color:#F44336;color:#7f1d1d}
.choice-btn.wrong .choice-no{color:#F44336}
.choice-btn.missed{background:#FFFBEB;border-color:#F59E0B;color:#78350f}
.choice-btn:disabled{cursor:default}

/* 피드백 */
.feedback-box{margin:4px 14px 14px;border-radius:10px;padding:12px 13px}
.feedback-box.correct{background:#F0FDF4;border:1.5px solid #4CAF50}
.feedback-box.wrong{background:#FFF1F2;border:1.5px solid #F44336}
.feedback-title{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.feedback-body{font-size:12px;line-height:1.65;color:#2C3A4A}
.feedback-key{font-size:11px;font-weight:600;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08);color:#374151;line-height:1.5}
.next-btn{background:#1F75FE;color:#fff;border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:block;width:calc(100% - 28px);margin:0 14px 14px}
.next-btn:hover{background:#1558C0}
.progress-bar{height:4px;background:#E2E8F0;border-radius:3px;margin:0 14px 9px;overflow:hidden}
.progress-fill{height:100%;background:#1F75FE;border-radius:3px;transition:width .5s ease}
.timer-row{display:flex;align-items:center;justify-content:space-between;padding:0 14px;margin-bottom:8px}
.timer-label{font-size:11px;color:#64748B;font-weight:600}
.timer-val{font-size:13px;font-weight:800;color:#1F75FE;font-variant-numeric:tabular-nums}
.timer-val.urgent{color:#F44336;animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.4}}

/* ECG 파형 판독 특수 스타일 */
.ecg-big{background:#080808;border-radius:10px;margin:10px 12px;padding:12px}
.ecg-big canvas{height:70px}
.ecg-hint{font-size:11px;color:#888;margin-top:6px;text-align:center}
.wave-choice{background:#111;border:1.5px solid #2a2a2a;color:#ccc;border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;font-size:13px;font-family:inherit;width:100%;text-align:left;display:flex;align-items:center;gap:8px;transition:all .15s}
.wave-choice:hover{border-color:#1F75FE;background:#1a1a1a}
.wave-choice.correct{background:#0a2a0a;border-color:#4CAF50;color:#4CAF50}
.wave-choice.wrong{background:#2a0a0a;border-color:#F44336;color:#F44336}
.wave-choice.missed{background:#2a2000;border-color:#F59E0B;color:#F59E0B}
.wave-choice:disabled{cursor:default}
.wave-no{font-size:11px;font-weight:700;min-width:18px;flex-shrink:0}

/* 결과 */
.result-screen{text-align:center;padding:20px 14px}
.result-score{font-size:52px;font-weight:900;color:#1F75FE;line-height:1;letter-spacing:-1px}
.result-label{font-size:13px;color:#64748B;margin:4px 0 12px}
.result-grade{font-size:24px;font-weight:800;margin-bottom:8px}
.result-msg{font-size:12px;color:#64748B;line-height:1.65;margin-bottom:16px}
.result-breakdown{background:#F8FAFD;border-radius:10px;padding:12px 14px;margin-bottom:14px;text-align:left;border:1px solid #E2E8F0;max-height:340px;overflow-y:auto}
.breakdown-hd{font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.breakdown-row{padding:6px 0;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.breakdown-row:last-child{border-bottom:none}
.breakdown-left{flex:1}
.breakdown-case{font-size:11.5px;color:#374151;line-height:1.4;font-weight:600}
.breakdown-key{font-size:10px;color:#94A3B8;margin-top:2px;line-height:1.4}
.breakdown-result{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.ok{background:#F0FDF4;color:#14532d}
.fail{background:#FFF1F2;color:#7f1d1d}
.skip{background:#F1F5F9;color:#475569}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.stat-box{background:#F8FAFD;border-radius:9px;padding:10px;text-align:center;border:1px solid #E2E8F0}
.stat-n{font-size:20px;font-weight:800;line-height:1}
.stat-l{font-size:10px;color:#64748B;margin-top:3px}
.restart-btn{width:100%;background:#1F4E79;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:8px}
.restart-btn:hover{background:#163A5E}
.home-btn{width:100%;background:#fff;color:#1F4E79;border:1.5px solid #1F4E79;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.timeout-badge{background:#FFFBEB;border:1px solid #F59E0B;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;color:#92400E;margin-bottom:7px;display:inline-block}
.diff-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;vertical-align:middle}
.diff-2{background:#FFF8E1;color:#E65100}.diff-3{background:#FFEBEE;color:#B71C1C}
.cat-chip{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:#EBF4FA;color:#1558C0;margin-left:5px;vertical-align:middle}
</style>
</head>
<body>
<div class="game">
  <div class="topbar">
    <h1><i class="ti ti-emergency-bed" aria-hidden="true" style="font-size:16px"></i>25병동 간호 시뮬레이션</h1>
    <div class="score-box">
      <div class="score-pill" id="score-display">0점</div>
      <div class="life-box" id="life-display"></div>
    </div>
  </div>
  <div id="main"></div>
</div>

// type: 'knowledge' — 간호 지식 객관식 (신규)
// ═══════════════════════════════════════════════════════

{type:'ecg_id',cat:'ECG 파형 판독',diff:1,

 ecg:'vf',ecgColor:'#FF5252',
 hint:'파형이 불규칙하게 흔들리며 QRS 식별 불가',

 failFb:'심실세동입니다. 파형이 완전히 무질서하고 QRS 식별이 불가합니다.',

{type:'ecg_id',cat:'ECG 파형 판독',diff:1,

 okFb:'정확합니다! AFib: P파 소실 + f파(잔떨림) + 불규칙 RR. 뇌졸중 위험 5배!',
 failFb:'심방세동입니다. P파가 없고 기저선에 f파가 보이며 RR 간격이 불규칙합니다.',
 key:'AFib: P파 소실+f파+불규칙 RR. 항응고 필요. CHA₂DS₂-VASc 점수 산정'},

{type:'ecg_id',cat:'ECG 파형 판독',diff:1,

 ecg:'brady',ecgColor:'#00E676',
 hint:'RR 간격이 넓고 심박수가 느림',

   {t:'동성 서맥 (Sinus Bradycardia)',ok:true},

   {t:'완전 방실차단',ok:false}

{type:'ecg_id',cat:'ECG 파형 판독',diff:1,

{type:'ecg_id',cat:'ECG 파형 판독',diff:2,

 choices:[

{type:'ecg_id',cat:'ECG 파형 판독',diff:2,

var ALL_BANK = [].concat(ECG_ID_BANK, KNOWLEDGE_BANK, CLINICAL_BANK);

var GAME_MODES = {
  all:   {name:'전체 랜덤',size:15,pool:ALL_BANK},
  ecg:   {name:'ECG 파형 판독',size:12,pool:ECG_ID_BANK},
  know:  {name:'간호 지식',size:12,pool:KNOWLEDGE_BANK},
  clin:  {name:'응급 대응',size:15,pool:CLINICAL_BANK},
};

var curMode = 'all';
var cur=0,score=0,lives=3,answered=false,results=[],gameSet=[],timerInt=null,timeLeft=60;

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function makeGameSet(mode){
  var m=GAME_MODES[mode];
  var shuffled=shuffle(m.pool);
  var set=shuffled.slice(0,m.size);
  return set.map(function(q){
    var choices=shuffle(q.choices);
    return Object.assign({},q,{choices:choices});
  });
}
function renderLives(){
  document.getElementById('life-display').innerHTML=
    Array.from({length:3},function(_,i){return '<span class="life">'+(i<lives?'❤':'🖤')+'</span>';}).join('');
}

// ── ECG 드로잉 ────────────────────────────────────
function drawECG(canvas,type,h_override){
  if(!canvas)return;
  var w=canvas.width=canvas.parentElement.offsetWidth-20;
  var h=canvas.height=h_override||52;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  var mid=h/2;
  ctx.strokeStyle=(type==='vf'||type==='stemi')&&h_override?'#FF5252':type==='vf'?'#FF5252':type==='completeavb'?'#FF9800':type==='vt'?'#F44336':type==='stemi'?'#F44336':'#00E676';
  if(type==='afib')ctx.strokeStyle='#CE93D8';
  if(type==='pvc')ctx.strokeStyle='#FF9800';
  if(type==='avb1')ctx.strokeStyle='#81C784';
  ctx.lineWidth=1.6;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();
  if(type==='normal'||type==='avb1'){
    ctx.moveTo(0,mid);var x=0;var pr=type==='avb1'?12:7;
    function nB(sx){ctx.lineTo(sx,mid);ctx.lineTo(sx+5,mid);ctx.lineTo(sx+6.5,mid-4);ctx.lineTo(sx+8,mid-5);ctx.lineTo(sx+9.5,mid-4);ctx.lineTo(sx+10.5,mid);ctx.lineTo(sx+10.5+pr,mid);ctx.lineTo(sx+11+pr,mid-2);ctx.lineTo(sx+13+pr,mid+26);ctx.lineTo(sx+14+pr,mid-17);ctx.lineTo(sx+15+pr,mid+5);ctx.lineTo(sx+16+pr,mid);ctx.lineTo(sx+19+pr,mid);ctx.lineTo(sx+21+pr,mid-7);ctx.lineTo(sx+23+pr,mid-7);ctx.lineTo(sx+25+pr,mid);ctx.lineTo(sx+44+pr,mid);}
    while(x<w){nB(x);x+=44+pr;}
  }else if(type==='vf'){
    ctx.moveTo(0,mid);for(var x=0;x<w;x+=2)ctx.lineTo(x,(Math.sin(x*.3+Math.random()*.8)*(h*.42))+(Math.random()-.5)*h*.22+mid);
  }else if(type==='afib'){
    ctx.moveTo(0,mid);var x=0;var gaps=[28,22,34,19,26,30];var gi=0;
    while(x<w){var g=gaps[gi%gaps.length];for(var j=0;j<g;j++)ctx.lineTo(x+j,Math.sin(j*.9+gi)*h*.1+(Math.random()-.5)*h*.06+mid);var qx=x+g;if(qx+14<w){ctx.lineTo(qx,mid);ctx.lineTo(qx+1,mid-3);ctx.lineTo(qx+2,mid+22);ctx.lineTo(qx+3,mid-13);ctx.lineTo(qx+4,mid+4);ctx.lineTo(qx+5,mid);ctx.lineTo(qx+9,mid-5);ctx.lineTo(qx+12,mid-5);ctx.lineTo(qx+14,mid);}x+=g+14;gi++;}
  }else if(type==='tachy'){
    ctx.moveTo(0,mid);var x=0;
    function tB(sx){ctx.lineTo(sx,mid);ctx.lineTo(sx+4,mid);ctx.lineTo(sx+5,mid-2);ctx.lineTo(sx+7,mid+21);ctx.lineTo(sx+8,mid-13);ctx.lineTo(sx+9,mid+4);ctx.lineTo(sx+10,mid);ctx.lineTo(sx+13,mid-5);ctx.lineTo(sx+15,mid-5);ctx.lineTo(sx+16,mid);ctx.lineTo(sx+26,mid);}
    while(x<w){tB(x);x+=26;}
  }else if(type==='brady'){
    ctx.moveTo(0,mid);var x=0;
    function bB(sx){ctx.lineTo(sx,mid);ctx.lineTo(sx+6,mid);ctx.lineTo(sx+8,mid-4);ctx.lineTo(sx+10,mid);ctx.lineTo(sx+11,mid);ctx.lineTo(sx+12,mid-2);ctx.lineTo(sx+14,mid+25);ctx.lineTo(sx+15,mid-17);ctx.lineTo(sx+16,mid+5);ctx.lineTo(sx+17,mid);ctx.lineTo(sx+20,mid);ctx.lineTo(sx+22,mid-7);ctx.lineTo(sx+25,mid-7);ctx.lineTo(sx+27,mid);ctx.lineTo(sx+72,mid);}
    while(x<w){bB(x);x+=72;}
  }else if(type==='vt'){
    ctx.moveTo(0,mid);var x=0;
    while(x<w-14){ctx.lineTo(x,mid);ctx.lineTo(x+2,mid+h*.3);ctx.lineTo(x+4,mid+h*.42);ctx.lineTo(x+6,mid+h*.35);ctx.lineTo(x+8,mid-h*.2);ctx.lineTo(x+10,mid-h*.38);ctx.lineTo(x+12,mid-h*.15);ctx.lineTo(x+14,mid);x+=14;}
  }else if(type==='pvc'){
    ctx.moveTo(0,mid);var x=0;
    function pn(sx){ctx.lineTo(sx,mid);ctx.lineTo(sx+8,mid);ctx.lineTo(sx+10,mid-4);ctx.lineTo(sx+12,mid);ctx.lineTo(sx+13,mid);ctx.lineTo(sx+14,mid-2);ctx.lineTo(sx+16,mid+25);ctx.lineTo(sx+17,mid-17);ctx.lineTo(sx+18,mid+5);ctx.lineTo(sx+19,mid);ctx.lineTo(sx+22,mid);ctx.lineTo(sx+24,mid-7);ctx.lineTo(sx+26,mid-7);ctx.lineTo(sx+28,mid);ctx.lineTo(sx+44,mid);}
    pn(0);pn(44);
    var qx=88;ctx.lineTo(qx,mid);ctx.lineTo(qx+.8,mid-h*.1);ctx.lineTo(qx+2,mid+h*.48);ctx.lineTo(qx+3.5,mid-h*.36);ctx.lineTo(qx+5.5,mid-h*.18);ctx.lineTo(qx+7.5,mid);ctx.lineTo(qx+9,mid-h*.12);ctx.lineTo(qx+12,mid-h*.14);ctx.lineTo(qx+14,mid);ctx.lineTo(qx+44,mid);
    pn(qx+44);
  }else if(type==='stemi'){
    ctx.moveTo(0,mid);var x=0;
    function stB(sx){ctx.lineTo(sx,mid);ctx.lineTo(sx+5,mid);ctx.lineTo(sx+6.5,mid-4);ctx.lineTo(sx+8,mid-5);ctx.lineTo(sx+9.5,mid-4);ctx.lineTo(sx+10.5,mid);ctx.lineTo(sx+11.5,mid);ctx.lineTo(sx+12,mid-h*.1);ctx.lineTo(sx+13,mid+h*.42);ctx.lineTo(sx+14,mid-h*.06);ctx.lineTo(sx+15,mid+h*.2);ctx.lineTo(sx+16.5,mid+h*.2);ctx.lineTo(sx+18,mid+h*.22);ctx.lineTo(sx+20,mid+h*.22);ctx.lineTo(sx+22,mid+h*.04);ctx.lineTo(sx+25,mid);ctx.lineTo(sx+34,mid);}
    while(x<w){stB(x);x+=34;}
  }else if(type==='completeavb'){
    // P파(파랑)
    ctx.setLineDash&&ctx.setLineDash([]);
    ctx.strokeStyle='#2196F3';ctx.lineWidth=1.2;
    var px2=0;
    while(px2<w-8){ctx.moveTo(px2,mid);ctx.lineTo(px2+3,mid-6);ctx.lineTo(px2+5,mid-7);ctx.lineTo(px2+7,mid-6);ctx.lineTo(px2+8,mid);px2+=14;}
    // QRS(빨강)
    ctx.strokeStyle='#F44336';ctx.lineWidth=1.8;
    var qx2=16,qi=0;var qgaps=[62,58,65];
    while(qx2<w-20){ctx.moveTo(qx2,mid);ctx.lineTo(qx2+2,mid+3);ctx.lineTo(qx2+4,mid+19);ctx.lineTo(qx2+5,mid-13);ctx.lineTo(qx2+7,mid+4);ctx.lineTo(qx2+8,mid);ctx.lineTo(qx2+11,mid-5);ctx.lineTo(qx2+16,mid-5);ctx.lineTo(qx2+18,mid);qx2+=qgaps[qi%qgaps.length];qi++;}
    ctx.stroke();return;
  }
  ctx.stroke();
}

// ── 모드 선택 화면 ────────────────────────────────
function showIntro(){
  document.getElementById('score-display').textContent='0점';
  var modes=[
    {key:'all',icon:'🏥',color:'#1F75FE',bg:'#EBF4FA',name:'전체 랜덤 15문제',desc:'ECG 파형 판독 + 간호 지식 + 응급 대응\n매번 다른 조합으로 출제',cnt:ALL_BANK.length},
    {key:'ecg',icon:'📈',color:'#9C27B0',bg:'#F3E5F5',name:'ECG 파형 판독',desc:'심전도 파형을 보고 부정맥 종류 맞추기\nNSR·VF·VT·AFib·PVC·STEMI 등',cnt:ECG_ID_BANK.length},
    {key:'know',icon:'📚',color:'#14532d',bg:'#F0FDF4',name:'간호 지식 퀴즈',desc:'투약·검사·응급 처치 지식\n입사 전 지식 측정 + 심화',cnt:KNOWLEDGE_BANK.length},
    {key:'clin',icon:'🚨',color:'#7f1d1d',bg:'#FFF1F2',name:'응급 대응 시뮬레이션',desc:'실제 임상 케이스 기반\n환자 모니터·SBAR 포함 대응 훈련',cnt:CLINICAL_BANK.length},
  ];
  var cards=modes.map(function(m){
    return '<div class="mode-card" onclick="startGame(\''+m.key+'\')">'+
      '<div class="mode-icon" style="background:'+m.bg+'">'+m.icon+'</div>'+
      '<div class="mode-info">'+
        '<div class="mode-name">'+m.name+'</div>'+
        '<div class="mode-desc">'+m.desc.replace('\n','<br>')+'</div>'+
        '<span class="mode-badge" style="background:'+m.bg+';color:'+m.color+'">문제은행 '+m.cnt+'문제</span>'+
      '</div>'+
      '<i class="ti ti-chevron-right" aria-hidden="true" style="font-size:16px;color:#CBD5E1;flex-shrink:0"></i>'+
    '</div>';
  }).join('');

  document.getElementById('main').innerHTML=
    '<div class="mode-screen">'+
    '<div style="font-size:36px;text-align:center;margin-bottom:8px">🏥</div>'+
    '<div class="mode-title">25병동 간호 시뮬레이션</div>'+
    '<div class="mode-sub">총 <strong>'+ALL_BANK.length+'문제</strong> 문제은행<br>원하는 모드를 선택하세요</div>'+
    '<div class="bank-stat">'+
      '<div class="stat-row-intro"><span>ECG 파형 판독</span><strong>'+ECG_ID_BANK.length+'문제</strong></div>'+
      '<div class="stat-row-intro"><span>간호 지식 퀴즈</span><strong>'+KNOWLEDGE_BANK.length+'문제</strong></div>'+
      '<div class="stat-row-intro"><span>응급 대응 시뮬레이션</span><strong>'+CLINICAL_BANK.length+'문제</strong></div>'+
      '<div class="stat-row-intro" style="font-weight:700"><span>전체 합계</span><strong style="color:#1F75FE">'+ALL_BANK.length+'문제</strong></div>'+
    '</div>'+
    cards+
    '</div>';
}

function startGame(mode){
  curMode=mode||'all';
  cur=0;score=0;lives=3;results=[];
  gameSet=makeGameSet(curMode);
  renderLives();showCase();
}

function startTimer(){
  clearInterval(timerInt);timeLeft=60;
  timerInt=setInterval(function(){
    timeLeft--;
    var el=document.getElementById('timer-val');
    if(el){el.textContent=timeLeft+'초';el.className='timer-val'+(timeLeft<=10?' urgent':'');}
    if(timeLeft<=0){clearInterval(timerInt);if(!answered)autoFail();}
  },1000);
}

function autoFail(){
  answered=true;lives=Math.max(0,lives-1);renderLives();
  results.push({i:cur,ok:false,timeout:true});
  var c=gameSet[cur];
  if(c.type==='ecg_id'){
    document.querySelectorAll('.wave-choice').forEach(function(b,i){b.disabled=true;if(c.choices[i].ok)b.classList.add('missed');});
  }else{
    document.querySelectorAll('.choice-btn').forEach(function(b,i){b.disabled=true;if(c.choices[i].ok)b.classList.add('missed');});
  }
  showFeedback(false,c,true);
  if(lives<=0){clearInterval(timerInt);setTimeout(showResult,2200);}
}

function showCase(){
  if(cur>=gameSet.length){clearInterval(timerInt);showResult();return;}
  answered=false;
  var c=gameSet[cur];
  var pct=Math.round(cur/gameSet.length*100);
  document.getElementById('score-display').textContent=score+'점';

  if(c.type==='ecg_id') renderEcgCase(c,pct);
  else if(c.type==='knowledge') renderKnowledgeCase(c,pct);
  else renderClinicalCase(c,pct);
  startTimer();
}

function headerBar(c,pct){
  var diffLabel=['','','<span class="diff-badge diff-2">어려움</span>','<span class="diff-badge diff-3">매우 어려움</span>'];
  return '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="timer-row"><span class="timer-label"><span class="cat-chip">'+c.cat+'</span> '+cur+'/'+gameSet.length+'</span><span class="timer-val" id="timer-val">60초</span></div>';
}

function renderEcgCase(c,pct){
  document.getElementById('main').innerHTML=
    headerBar(c,pct)+
    '<div class="case-card">'+
    '<div class="case-hdr"><span class="case-hdr-title">'+c.title+'</span><span class="case-tag" style="color:'+c.tagColor+';background:'+c.tagBg+'">'+c.tag+'</span></div>'+
    '<div class="ecg-big"><div class="ecg-label"><span>ECG MONITOR</span><span style="color:#666;font-size:9px">파형을 보고 리듬을 판독하세요</span></div><canvas id="ecg-big-cv"></canvas><div class="ecg-hint">'+c.hint+'</div></div>'+
    '<div class="choices"><div class="choices-title">이 리듬은 무엇인가요?</div>'+
    c.choices.map(function(ch,i){return '<button class="wave-choice" onclick="pickWave('+i+')"><span class="wave-no">'+(i+1)+'</span><span>'+ch.t+'</span></button>';}).join('')+
    '</div></div>';
  setTimeout(function(){var cv=document.getElementById('ecg-big-cv');if(cv)drawECG(cv,c.ecg,70);},80);
}

function renderKnowledgeCase(c,pct){
  document.getElementById('main').innerHTML=
    headerBar(c,pct)+
    '<div class="case-card">'+
    '<div class="case-hdr"><span class="case-hdr-title">'+c.title+'</span><span class="case-tag" style="color:'+c.tagColor+';background:'+c.tagBg+'">'+c.tag+'</span></div>'+
    '<div class="situation-box"><p style="font-size:14px;font-weight:600;color:#1a2e44">'+c.situation+'</p></div>'+
    '<div class="choices"><div class="choices-title">정답을 선택하세요</div>'+
    c.choices.map(function(ch,i){return '<button class="choice-btn" onclick="pick('+i+')"><span class="choice-no">'+(i+1)+'</span><span>'+ch.t+'</span></button>';}).join('')+
    '</div></div>';
}

function renderClinicalCase(c,pct){
  var diffLabel=['','','<span class="diff-badge diff-2">어려움</span>','<span class="diff-badge diff-3">매우 어려움</span>'];
  document.getElementById('main').innerHTML=
    headerBar(c,pct)+
    '<div class="case-card">'+
    '<div class="case-hdr"><span class="case-hdr-title">'+c.title+(diffLabel[c.diff]||'')+'</span><span class="case-tag" style="color:'+c.tagColor+';background:'+c.tagBg+'">'+c.tag+'</span></div>'+
    '<div class="patient-strip"><div class="pt-row"><div class="pt-item"><strong>'+c.patient.name+'</strong> '+c.patient.age+'</div><div class="pt-item"><strong>'+c.patient.room+'</strong></div><div class="pt-item">'+c.patient.dx+'</div></div></div>'+
    '<div class="monitor-bg"><div class="monitor-row">'+
    c.vitals.map(function(v){return '<div class="vital-box"><div class="vital-label">'+v.l+'</div><div class="vital-value '+v.c+'">'+v.v+'<span class="vital-unit">'+v.u+'</span></div></div>';}).join('')+
    '</div></div>'+
    '<div class="ecg-area"><div class="ecg-label"><span>ECG MONITOR</span></div><canvas id="ecg-cv"></canvas></div>'+
    '<div class="situation-box"><p>'+c.situation+'</p>'+(c.nurse?'<div class="nurse-says">"'+c.nurse+'"</div>':'')+'</div>'+
    '<div class="choices"><div class="choices-title">최선의 대응은?</div>'+
    c.choices.map(function(ch,i){return '<button class="choice-btn" onclick="pick('+i+')"><span class="choice-no">'+(i+1)+'</span><span>'+ch.t+'</span></button>';}).join('')+
    '</div></div>';
  setTimeout(function(){var cv=document.getElementById('ecg-cv');if(cv)drawECG(cv,c.ecg||'normal');},80);
}

function pickWave(idx){
  if(answered)return;
  answered=true;clearInterval(timerInt);
  var c=gameSet[cur];
  var ok=c.choices[idx].ok;
  if(ok)score+=Math.max(10,Math.round(timeLeft/60*100));
  else lives=Math.max(0,lives-1);
  renderLives();
  results.push({i:cur,ok:ok,idx:idx});
  document.getElementById('score-display').textContent=score+'점';
  document.querySelectorAll('.wave-choice').forEach(function(b,i){
    b.disabled=true;
    if(c.choices[i].ok)b.classList.add('correct');
    else if(i===idx&&!c.choices[i].ok)b.classList.add('wrong');
  });
  showFeedback(ok,c,false);
  if(lives<=0){clearInterval(timerInt);setTimeout(showResult,2500);}
}

function pick(idx){
  if(answered)return;
  answered=true;clearInterval(timerInt);
  var c=gameSet[cur];
  var ok=c.choices[idx].ok;
  if(ok)score+=Math.max(10,Math.round(timeLeft/60*100));
  else lives=Math.max(0,lives-1);
  renderLives();
  results.push({i:cur,ok:ok,idx:idx});
  document.getElementById('score-display').textContent=score+'점';
  document.querySelectorAll('.choice-btn').forEach(function(b,i){
    b.disabled=true;
    if(c.choices[i].ok)b.classList.add('correct');
    else if(i===idx&&!c.choices[i].ok)b.classList.add('wrong');
  });
  showFeedback(ok,c,false);
  if(lives<=0){clearInterval(timerInt);setTimeout(showResult,2500);}
}

function showFeedback(ok,c,timeout){
  var wrap=document.querySelector('.choices');
  if(!wrap)return;
  var fb=document.createElement('div');
  fb.className='feedback-box '+(ok?'correct':'wrong');
  fb.innerHTML=
    (timeout?'<div class="timeout-badge">⏰ 시간 초과!</div><br>':'')+
    '<div class="feedback-title"><i class="ti '+(ok?'ti-circle-check':'ti-circle-x')+'" aria-hidden="true" style="font-size:17px;color:'+(ok?'#4CAF50':'#F44336')+'"></i>'+(ok?'정답! 훌륭해요':'오답입니다')+'</div>'+
    '<div class="feedback-body">'+(ok?c.okFb:c.failFb)+'</div>'+
    '<div class="feedback-key"><i class="ti ti-bulb" aria-hidden="true" style="font-size:12px;vertical-align:-2px;margin-right:4px;color:#F59E0B"></i>핵심: '+c.key+'</div>';
  wrap.appendChild(fb);
  var nb=document.createElement('button');
  nb.className='next-btn';
  nb.innerHTML=cur<gameSet.length-1
    ?'<i class="ti ti-arrow-right" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>다음 문제'
    :'<i class="ti ti-flag-3" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>최종 결과';
  nb.onclick=function(){cur++;showCase();};
  wrap.appendChild(nb);
  setTimeout(function(){fb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
}

function showResult(){
  clearInterval(timerInt);
  var total=gameSet.length;
  var correct=results.filter(function(r){return r.ok;}).length;
  var pct=Math.round(correct/total*100);
  var grade,gc,msg;
  if(pct>=90){grade='A+ 최우수';gc='#14532d';msg='완벽한 실력입니다! 독립 간호사로 손색없어요.';}
  else if(pct>=75){grade='B+ 우수';gc='#1e40af';msg='대부분 올바른 판단을 했습니다. 틀린 것을 복습해보세요!';}
  else if(pct>=50){grade='C 양호';gc='#92400E';msg='기본은 알고 있지만 우선순위가 아직 헷갈리는군요.';}
  else{grade='D 재도전';gc='#7f1d1d';msg='교육 자료 복습 후 다시 도전해보세요!';}
  var breakdownRows=gameSet.map(function(c,i){
    var r=results.find(function(r){return r.i===i;});
    var ok=r&&r.ok;
    var cls=!r?'skip':(ok?'ok':'fail');
    var label=!r?'미응시':(ok?'✓ 정답':(r.timeout?'⏰ 초과':'✗ 오답'));
    return '<div class="breakdown-row"><div class="breakdown-left"><div class="breakdown-case">'+c.title+'</div>'+(!ok&&r?'<div class="breakdown-key">'+c.key+'</div>':'')+'</div><span class="breakdown-result '+cls+'">'+label+'</span></div>';
  }).join('');
  document.getElementById('main').innerHTML=
    '<div class="result-screen">'+
    '<div style="font-size:40px;margin-bottom:8px;color:#1F75FE"><i class="ti ti-award" aria-hidden="true"></i></div>'+
    '<div class="result-score">'+score+'</div>'+
    '<div class="result-label">최종 점수 ('+GAME_MODES[curMode].name+')</div>'+
    '<div class="result-grade" style="color:'+gc+'">'+grade+'</div>'+
    '<div class="result-msg">'+msg+'</div>'+
    '<div class="stat-grid">'+
    '<div class="stat-box"><div class="stat-n" style="color:#14532d">'+correct+'/'+total+'</div><div class="stat-l">정답</div></div>'+
    '<div class="stat-box"><div class="stat-n" style="color:#1F75FE">'+lives+'</div><div class="stat-l">남은 하트</div></div>'+
    '<div class="stat-box"><div class="stat-n" style="color:#92400E">'+ALL_BANK.length+'</div><div class="stat-l">전체 문제</div></div>'+
    '</div>'+
    '<div class="result-breakdown"><div class="breakdown-hd">이번 라운드 결과 (오답 핵심 포인트)</div>'+breakdownRows+'</div>'+
    '<button class="restart-btn" onclick="startGame(\''+curMode+'\')"><i class="ti ti-refresh" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>같은 모드 다시 도전</button>'+
    '<button class="home-btn" onclick="showIntro()"><i class="ti ti-home" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>모드 선택으로 돌아가기</button>'+
    '</div>';
}

renderLives();
showIntro();
</script>
